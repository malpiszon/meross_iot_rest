name: Build and publish docker image

on:
  workflow_dispatch:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  schedule:
    - cron: '0 10 * * *'

env:
  REGISTRY: ghcr.io
  PYTHON_IMAGE_VERSION: 3.14-alpine

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python for tests
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      
      - name: Test with pytest
        run: pytest

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Resolve Python base image
        id: python-base
        shell: bash
        run: |
          image="python:${PYTHON_IMAGE_VERSION}"
          digest="$(docker buildx imagetools inspect "${image}" --format '{{.Manifest.Digest}}')"
          echo "image=${image}" >> "$GITHUB_OUTPUT"
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log into Docker Hub
        id: docker-hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Get MerossIot version
        id: lib-version
        shell: bash
        run: |
            endpoint='https://api.github.com/repos/albertogeniola/MerossIot/releases/latest';
            lib_summary=$(curl -s "${endpoint}");
            version=$(echo "${lib_summary}" | jq '{"name"} | .name' | tr -d '"' | awk '{print $2}');
            echo "merossiot_version=${version}" >> $GITHUB_OUTPUT
          
      - name: Get latest package version
        id: package-version
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          lib_version=${{ steps.lib-version.outputs.merossiot_version }}
          endpoint='/users/malpiszon/packages/container/meross_iot_rest/versions';
          package_summary=$(gh api "${endpoint}");
          package_for_version_exists=$(echo "${package_summary}" | jq '.[0].metadata.container.tags' | { grep -c "${lib_version}" || true; } );
          echo "package_exists=${package_for_version_exists}" >> $GITHUB_OUTPUT

      - name: Extract Docker metadata
        if: ${{ (github.event_name != 'schedule') || (steps.package-version.outputs.package_exists == '0') }}
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ vars.DOCKERHUB_IMAGE_NAME }}
            ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=raw,value=merossiot-${{ steps.lib-version.outputs.merossiot_version }}
            type=raw,value=python-${{ env.PYTHON_IMAGE_VERSION }}

      - name: Build and push
        if: ${{ (github.event_name != 'schedule') || (steps.package-version.outputs.package_exists == '0') }}
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          build-args: |
            "PYTHON_IMAGE_VERSION=${{ env.PYTHON_IMAGE_VERSION }}"
          pull: true
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=target,annotation-index.org.opencontainers.image.description=RESTed (Flask with Waitress) example of MerosIot library
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Delete all untagged packages
        if: github.event_name != 'pull_request'
        uses: actions/delete-package-versions@v5
        with:
          package-name: ${{ github.event.repository.name }}
          package-type: 'container'
          min-versions-to-keep: 0
          delete-only-untagged-versions: 'true'

      - name: Find package versions older than one year
        id: old-package-versions
        if: github.event_name != 'pull_request'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          OWNER_TYPE: ${{ github.event.repository.owner.type }}
          PACKAGE_NAME: ${{ github.event.repository.name }}
        run: |
          cutoff="$(date -u -d '1 year ago' '+%Y-%m-%dT%H:%M:%SZ')"
          if [ "${OWNER_TYPE}" = "Organization" ]; then
            endpoint="/orgs/${OWNER}/packages/container/${PACKAGE_NAME}/versions"
          else
            endpoint="/users/${OWNER}/packages/container/${PACKAGE_NAME}/versions"
          fi

          version_ids="$(gh api --paginate "${endpoint}" \
            | jq -rs "[.[][] | select(.created_at < \"${cutoff}\") | .id] | join(\",\")")"

          echo "version_ids=${version_ids}" >> $GITHUB_OUTPUT
          if [ -z "${version_ids}" ]; then
            echo "No package versions older than ${cutoff} found."
          else
            echo "Found package versions older than ${cutoff}: ${version_ids}"
          fi

      - name: Delete package versions older than one year
        if: github.event_name != 'pull_request' && steps.old-package-versions.outputs.version_ids != ''
        uses: actions/delete-package-versions@v5
        with:
          package-name: ${{ github.event.repository.name }}
          package-type: 'container'
          package-version-ids: ${{ steps.old-package-versions.outputs.version_ids }}

      - name: Generate build summary
        run: |
          MEROSS_IOT_VERSION=${{ steps.lib-version.outputs.merossiot_version }}
          PYTHON_IMAGE=${{ steps.python-base.outputs.image }}
          PYTHON_IMAGE_DIGEST=${{ steps.python-base.outputs.digest }}
          RUN_TYPE=${{ github.event_name }}
          NEW_VERSION_PACKAGE=${{ steps.package-version.outputs.package_exists == '0' }}
          NEW_PACKAGE_BUILT=${{ (github.event_name != 'schedule') || (steps.package-version.outputs.package_exists == '0') }}
          echo "## Build variables:" >> $GITHUB_STEP_SUMMARY
          echo "- MerossIot lib version: ${MEROSS_IOT_VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "- Python image: ${PYTHON_IMAGE}" >> $GITHUB_STEP_SUMMARY
          echo "- Python image digest: ${PYTHON_IMAGE_DIGEST}" >> $GITHUB_STEP_SUMMARY
          echo "- Run type: ${RUN_TYPE}" >> $GITHUB_STEP_SUMMARY
          echo "- Build for the new lib version: ${NEW_VERSION_PACKAGE}" >> $GITHUB_STEP_SUMMARY
          echo "- New package built and pushed: ${NEW_PACKAGE_BUILT}" >> $GITHUB_STEP_SUMMARY
